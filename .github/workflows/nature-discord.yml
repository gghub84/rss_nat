name: Nature updates to Discord

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check feeds and post matches
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_VESICLES: ${{ secrets.WEBHOOK_VESICLES }}
          POST_ON_FIRST_RUN: "true"
        run: python scripts/nature_to_discord.py

      - name: Commit seen item state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/seen.json
          git diff --cached --quiet || git commit -m "Update seen RSS items"
          git push
